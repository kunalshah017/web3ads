name: Deploy Server to Azure App Service

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - "server/**"
            - ".github/workflows/deploy-server.yml"

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        name: Build and Deploy Server
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --filter=server...

            - name: Build TypeScript
              working-directory: ./server
              run: pnpm build

            - name: Prune dev dependencies
              working-directory: ./server
              run: pnpm prune --prod

            - name: Create deployment package
              working-directory: ./server
              run: |
                  mkdir -p deploy
                  cp -r dist deploy/
                  cp package.json deploy/
                  cp -r node_modules deploy/
                  cp -r prisma deploy/
                  cd deploy && zip -r ../deploy.zip .

            - name: Deploy to Azure Web App
              env:
                  PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
              run: |
                  # Extract credentials from publish profile
                  USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
                  PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)

                  # Deploy using Kudu ZIP API
                  curl -X POST \
                    -u "$USERNAME:$PASSWORD" \
                    --data-binary @./server/deploy.zip \
                    "https://web3ads-api.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
                    -H "Content-Type: application/zip" \
                    --fail
