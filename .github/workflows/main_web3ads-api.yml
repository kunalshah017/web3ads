# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - web3ads-api

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/main_web3ads-api.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter=server...

      - name: Build TypeScript
        working-directory: ./server
        run: pnpm build

      - name: Prune dev dependencies
        working-directory: ./server
        run: pnpm prune --prod

      - name: Create deployment package
        working-directory: ./server
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp -r node_modules deploy/
          cp -r prisma deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./server/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'web3ads-api'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_053A9E9440094A7D8509F803FD9373D7 }}